{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus display-1 text-danger"></i>
                    <h2 class="mt-3">Create Account</h2>
                    <p class="text-muted">Join us and start booking movies</p>
                </div>
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-person"></i> Full Name</label>
                        <input type="text" name="name" class="form-control bg-dark text-white border-secondary"
                               placeholder="Enter your full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-envelope"></i> Email</label>
                        <input type="email" name="email" class="form-control bg-dark text-white border-secondary"
                               placeholder="Enter your email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                        <input type="password" name="password" class="form-control bg-dark text-white border-secondary"
                               placeholder="Create a password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-lock-fill"></i> Confirm Password</label>
                        <input type="password" name="confirm_password"
                               class="form-control bg-dark text-white border-secondary"
                               placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 btn-lg mt-3">
                        <i class="bi bi-person-plus"></i> Register
                    </button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">Already have an account?
                        <a href="{{ url_for('login') }}" class="text-danger text-decoration-none">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
