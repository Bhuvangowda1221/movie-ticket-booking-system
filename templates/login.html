{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle display-1 text-danger"></i>
                    <h2 class="mt-3">Welcome Back</h2>
                    <p class="text-muted">Login to book your favorite movies</p>
                </div>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-envelope"></i> Email</label>
                        <input type="email" name="email" class="form-control bg-dark text-white border-secondary"
                               placeholder="Enter your email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                        <input type="password" name="password" class="form-control bg-dark text-white border-secondary"
                               placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 btn-lg mt-3">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">Don't have an account?
                        <a href="{{ url_for('register') }}" class="text-danger text-decoration-none">Register here</a>
                    </p>
                </div>
                <div class="text-center mt-2">
                    <small class="text-muted">
                        Admin Login: admin@movie.com / admin123
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
